<!DOCTYPE html>
<html>
<head>
<title>Tcodetech Game</title>

<style>
body {
  margin: 0;
  background: #666;
  font-family: Arial;
  color: white;
  text-align: center;
}

/* TOP */
#topBar {
  display: flex;
  justify-content: space-between;
  padding: 10px 30px;
}

/* GAME AREA */
#gameArea {
  position: relative;
  width: 400px;
  height: 450px;
  margin: 40px auto;
  background: #777;
  border-radius: 10px;
  overflow: hidden;
}

/* 🔵 BAR (LOWER NOW) */
#line {
  position: absolute;
  bottom: 100px; /* ↓ moved down */
  left: 30px;
  width: 340px;
  height: 10px;
  background: cyan;
}

/* 🎨 BLOCKS (LOWER) */
#blocks {
  position: absolute;
  bottom: 30px; /* ↓ moved down */
  left: 30px;
  display: flex;
}

.block {
  width: 85px;
  height: 50px;
  cursor: pointer;
}

.selected {
  outline: 3px solid white;
}

/* BALL */
.ball {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  position: absolute;
}

/* LEADERBOARD */
#leaderboard {
  width: 300px;
  margin: 20px auto;
  background: #222;
  padding: 15px;
  border-radius: 10px;
}

.item {
  display: flex;
  justify-content: space-between;
  background: #333;
  margin: 5px;
  padding: 8px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="topBar">
  <div>Score: <span id="score">0</span></div>
  <div>High Score: <span id="highScore">0</span></div>
</div>

<div id="gameArea">

  <div id="line"></div>

  <div id="blocks">
    <div class="block" style="background: yellow;"></div>
    <div class="block" style="background: cyan;"></div>
    <div class="block" style="background: green;"></div>
    <div class="block" style="background: pink;"></div>
  </div>

</div>

<div id="leaderboard">
  <h3>Leaderboard</h3>
  <div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_Pj3FjqQC_eujcMLa9_a-vYkst0ij5VQ",
  authDomain: "tcodetech.firebaseapp.com",
  databaseURL: "https://tcodetech-default-rtdb.firebaseio.com",
  projectId: "tcodetech"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// GAME
let colors = ["yellow","cyan","green","pink"];
let selected = 0;
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;

document.getElementById("highScore").innerText = highScore;

const blocks = document.querySelectorAll(".block");
const line = document.getElementById("line");
const gameArea = document.getElementById("gameArea");

updateSelection();

blocks.forEach((block, index) => {
  block.onclick = () => {
    selected = index;
    updateSelection();
  };
});

function updateSelection() {
  blocks.forEach(b => b.classList.remove("selected"));
  blocks[selected].classList.add("selected");
  line.style.background = colors[selected];
}

/* 🐢 SMOOTH SPEED (gradual increase) */
function getSpeed() {
  return 2 + (score * 0.2); 
  // starts slow (2) and increases slowly
}

// BALL
function createBall() {

  let ball = document.createElement("div");
  let colorIndex = Math.floor(Math.random() * 4);

  ball.classList.add("ball");
  ball.style.background = colors[colorIndex];

  let x = Math.random() * (gameArea.clientWidth - 20);
  ball.style.left = x + "px";
  ball.style.top = "0px";

  gameArea.appendChild(ball);

  let fall = setInterval(() => {
    let top = parseFloat(ball.style.top);
    ball.style.top = top + getSpeed() + "px";

    let lineTop = line.offsetTop;

    if (top >= lineTop - 10) {
      clearInterval(fall);

      if (colorIndex === selected) {
        score++;
        document.getElementById("score").innerText = score;
        ball.remove();
      } else {
        gameOver();
      }
    }
  }, 20);
}

setInterval(createBall, 900);

// GAME OVER
function gameOver() {
  if (score > highScore) {
    highScore = score;
    localStorage.setItem("highScore", highScore);
    document.getElementById("highScore").innerText = highScore;

    let name = prompt("Enter name:");
    if (!name) name = "Player";

    push(ref(db, "scores"), { name, score: highScore });
  }

  alert("Game Over: " + score);
  location.reload();
}

// LEADERBOARD
onValue(ref(db, "scores"), snapshot => {
  let data = snapshot.val();
  let html = "";

  if (data) {
    let arr = Object.values(data);
    arr.sort((a,b) => b.score - a.score);

    arr.slice(0,10).forEach((d,i) => {
      html += `<div class="item">#${i+1} ${d.name} <span>${d.score}</span></div>`;
    });
  }

  document.getElementById("list").innerHTML = html;
});

</script>

</body>
</html>
